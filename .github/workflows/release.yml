name: Release Pipeline

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  # -------------------------------------------------------------------
  # JOB 1: RELEASE PLEASE
  # -------------------------------------------------------------------
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - name: Release Please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          release-type: simple
          path: .

  # -------------------------------------------------------------------
  # JOB 2: CONSTRUIR Y SUBIR APPIMAGE (LINUX)
  # -------------------------------------------------------------------
  build_linux:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    name: Build & Release AppImage
    runs-on: ubuntu-latest
    env:
      APP_NAME: lutris_game_station

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Instalar dependencias de compilación Linux
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang cmake ninja-build \
            libgtk-3-dev libblkid-dev liblzma-dev \
            libgcrypt20-dev libsqlite3-dev pkg-config \
            imagemagick patchelf

      - name: Configurar Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Extraer versión desde el TAG
        run: |
          TAG="${{ needs.release-please.outputs.tag_name }}"
          TAG=${TAG#v}
          echo "TAG_VERSION=$TAG" >> $GITHUB_ENV

      - name: Actualizar pubspec.yaml automáticamente
        run: |
          CURRENT_VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //')
          BUILD_NUMBER=$(echo $CURRENT_VERSION | cut -d'+' -f2)
          NEW_BUILD_NUMBER=$((BUILD_NUMBER + 1))
          sed -i "s/^version:.*/version: $TAG_VERSION+$NEW_BUILD_NUMBER/" pubspec.yaml

      - name: Commit de actualización de versión
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add pubspec.yaml
          git commit -m "chore: actualizar versión a $TAG_VERSION [skip ci]"
          git push origin main

      - name: Instalar dependencias de Flutter
        run: flutter pub get

      - name: Compilar para Linux (Release)
        run: flutter build linux --release

      - name: Generar AppImage (Estrategia Maestra V3)
        env:
          APPIMAGE_EXTRACT_AND_RUN: 1
        run: |
          # 1. Descargar linuxdeploy
          curl -L -o linuxdeploy-x86_64.AppImage https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage

          # 2. Preparar AppDir
          mkdir -p AppDir/usr/bin AppDir/usr/lib AppDir/usr/share/applications AppDir/usr/share/icons/hicolor/512x512/apps

          # 3. Copiar bundle de flutter
          cp -r build/linux/x64/release/bundle/* AppDir/usr/bin/

          # 4. Mover libs del bundle a usr/lib (estándar AppImage)
          if [ -d "AppDir/usr/bin/lib" ]; then
            mv AppDir/usr/bin/lib/* AppDir/usr/lib/ || true
            rmdir AppDir/usr/bin/lib || true
          fi

          # 5. Copiar libsqlite3.so.0 con fallbacks y crear symlink libsqlite3.so
          SQLITE_SRC=$(ldconfig -p | grep libsqlite3.so.0 | head -n1 | awk '{print $4}')
          if [ -z "$SQLITE_SRC" ]; then
            for p in /usr/lib/x86_64-linux-gnu/libsqlite3.so.0 /usr/lib/libsqlite3.so.0 /lib/x86_64-linux-gnu/libsqlite3.so.0; do
              [ -f "$p" ] && { SQLITE_SRC="$p"; break; }
            done
          fi

          if [ -n "$SQLITE_SRC" ]; then
            cp -v "$SQLITE_SRC" AppDir/usr/lib/
            ln -sf libsqlite3.so.0 AppDir/usr/lib/libsqlite3.so
            echo "sqlite copiada desde $SQLITE_SRC"
          else
            echo "WARNING: libsqlite3.so.0 no encontrada"
          fi

          # 6. Fijar RPATH del binario para que busque en ../lib (indispensable)
          BINARY="AppDir/usr/bin/${{ env.APP_NAME }}"
          patchelf --set-rpath '$ORIGIN/../lib' "$BINARY"
          echo "RPATH fijado en $BINARY"

          # 7. Copiar .desktop e icono (redimensionado)
          cp linux/${{ env.APP_NAME }}.desktop AppDir/usr/share/applications/
          convert linux/${{ env.APP_NAME }}.png -resize 512x512 AppDir/usr/share/icons/hicolor/512x512/apps/${{ env.APP_NAME }}.png || true

          # 8. Crear AppRun personalizado (Garantía total)
          cat > AppDir/AppRun <<'APP_RUN'
          #!/bin/sh
          HERE="$(dirname "$(readlink -f "$0")")"
          export LD_LIBRARY_PATH="$HERE/usr/lib:$LD_LIBRARY_PATH"
          exec "$HERE/usr/bin/${{ env.APP_NAME }}" "$@"
          APP_RUN
          chmod +x AppDir/AppRun

          # 9. Ejecutar linuxdeploy (usando el AppDir ya organizado)
          ./linuxdeploy-x86_64.AppImage --appdir AppDir \
            --desktop-file AppDir/usr/share/applications/${{ env.APP_NAME }}.desktop \
            --icon-file AppDir/usr/share/icons/hicolor/512x512/apps/${{ env.APP_NAME }}.png \
            --output appimage

      - name: Renombrar AppImage para incluir versión
        run: |
          GENERATED_FILE=$(ls *.AppImage | grep -v "linuxdeploy")
          mv "$GENERATED_FILE" "${{ env.APP_NAME }}-${{ env.TAG_VERSION }}-x86_64.AppImage"

      - name: Publicar Release en GitHub
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: |
            ${{ env.APP_NAME }}-${{ env.TAG_VERSION }}-x86_64.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
