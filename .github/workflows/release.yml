name: Release Pipeline

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  # -------------------------------------------------------------------
  # JOB 1: RELEASE PLEASE
  # -------------------------------------------------------------------
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - name: Release Please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          release-type: simple
          path: .

  # -------------------------------------------------------------------
  # JOB 2: COMPILAR BUNDLE LINUX (Ubuntu 22.04 para compatibilidad total)
  # -------------------------------------------------------------------
  build_linux:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    name: Build Linux Bundle
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Instalar dependencias de compilación
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang lld cmake ninja-build pkg-config \
            libgtk-3-dev libblkid-dev liblzma-dev \
            libgcrypt20-dev libsqlite3-dev build-essential

      - name: Configurar Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Instalar dependencias de Flutter
        run: flutter pub get

      - name: Crear archivo .env desde secrets
        run: |
          cat << EOF > .env
          SS_DEV_ID=${{ secrets.SS_DEV_ID }}
          SS_DEV_PASSWORD=${{ secrets.SS_DEV_PASSWORD }}
          SS_SOFT_NAME=${{ secrets.SS_SOFT_NAME }}
          EOF

      - name: Extraer versión del Tag
        run: |
          TAG="${{ needs.release-please.outputs.tag_name }}"
          VERSION=${TAG#v}
          echo "APP_VERSION=$VERSION" >> $GITHUB_ENV

      - name: Compilar para Linux (Release)
        run: |
          # Usamos el mismo ID de aplicación que en el código C++
          flutter build linux --release --build-name=$APP_VERSION

      - name: Subir Bundle como Artefacto
        uses: actions/upload-artifact@v4
        with:
          name: linux-bundle
          path: build/linux/x64/release/bundle/

  # -------------------------------------------------------------------
  # JOB 3: EMPAQUETAR (AppImage & Tarball)
  # -------------------------------------------------------------------
  package:
    needs: [release-please, build_linux]
    name: Package Release
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Descargar Bundle Artefacto
        uses: actions/download-artifact@v4
        with:
          name: linux-bundle
          path: build/linux/x64/release/bundle/

      - name: Instalar herramientas de empaquetado
        run: |
          sudo apt-get update
          sudo apt-get install -y patchelf imagemagick libgdk-pixbuf2.0-dev

      - name: Extraer versión del Tag
        run: |
          TAG="${{ needs.release-please.outputs.tag_name }}"
          echo "APP_VERSION=${TAG#v}" >> $GITHUB_ENV

      - name: Generar AppImage
        run: ./scripts/package_appimage.sh ${{ env.APP_VERSION }}

      - name: Generar Tarball
        run: ./scripts/package_tarball.sh ${{ env.APP_VERSION }}

      - name: Publicar Release en GitHub
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: |
            *.AppImage
            *.tar.xz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
