name: Release Pipeline

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  # -------------------------------------------------------------------
  # JOB 1: RELEASE PLEASE
  # -------------------------------------------------------------------
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - name: Release Please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          release-type: simple
          path: .

  # -------------------------------------------------------------------
  # JOB 2: CONSTRUIR Y SUBIR APPIMAGE (LINUX)
  # -------------------------------------------------------------------
  build_linux:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    name: Build & Release AppImage
    runs-on: ubuntu-latest
    env:
      APP_NAME: lutris_game_station

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Instalar dependencias de compilación Linux
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang cmake ninja-build \
            libgtk-3-dev libblkid-dev liblzma-dev \
            libgcrypt20-dev libsqlite3-dev pkg-config \
            imagemagick

      - name: Configurar Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Extraer versión desde el TAG
        run: |
          TAG="${{ needs.release-please.outputs.tag_name }}"
          TAG=${TAG#v}
          echo "TAG_VERSION=$TAG" >> $GITHUB_ENV

      - name: Actualizar pubspec.yaml automáticamente
        run: |
          CURRENT_VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //')
          BUILD_NUMBER=$(echo $CURRENT_VERSION | cut -d'+' -f2)
          NEW_BUILD_NUMBER=$((BUILD_NUMBER + 1))
          sed -i "s/^version:.*/version: $TAG_VERSION+$NEW_BUILD_NUMBER/" pubspec.yaml

      - name: Commit de actualización de versión
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add pubspec.yaml
          git commit -m "chore: actualizar versión a $TAG_VERSION [skip ci]"
          git push origin main

      - name: Instalar dependencias de Flutter
        run: flutter pub get

      - name: Compilar para Linux (Release)
        run: flutter build linux --release

      - name: Generar AppImage (Enfoque Manual Robusto)
        env:
          APPIMAGE_EXTRACT_AND_RUN: 1
        run: |
          # 1. Descargar linuxdeploy
          curl -L -o linuxdeploy-x86_64.AppImage https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage

          # 2. Preparar la estructura AppDir
          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/lib
          mkdir -p AppDir/usr/share/applications
          mkdir -p AppDir/usr/share/icons/hicolor/512x512/apps

          # 3. Copiar TODO el bundle de Flutter a usr/bin
          cp -r build/linux/x64/release/bundle/* AppDir/usr/bin/
          
          # 4. SOLUCIÓN DEFINITIVA SQLITE: Copiar la librería del sistema al bundle de la app
          # Buscamos la ruta real de libsqlite3.so.0 y la copiamos con el nombre que espera Dart
          SQLITE_PATH=$(ldconfig -p | grep libsqlite3.so.0 | head -n 1 | awk '{print $4}')
          cp "$SQLITE_PATH" AppDir/usr/bin/lib/libsqlite3.so
          echo "Copiada librería sqlite desde $SQLITE_PATH a AppDir/usr/bin/lib/libsqlite3.so"

          # 5. Copiar archivos de escritorio e iconos
          cp linux/${{ env.APP_NAME }}.desktop AppDir/usr/share/applications/
          convert linux/${{ env.APP_NAME }}.png -resize 512x512 AppDir/usr/share/icons/hicolor/512x512/apps/${{ env.APP_NAME }}.png

          # 6. Ejecutar linuxdeploy
          # Usamos --deploy-deps-only para que no intente strip en cosas que ya están optimizadas
          ./linuxdeploy-x86_64.AppImage --appdir AppDir \
            --executable AppDir/usr/bin/${{ env.APP_NAME }} \
            --desktop-file AppDir/usr/share/applications/${{ env.APP_NAME }}.desktop \
            --output appimage

      - name: Renombrar AppImage para incluir versión
        run: |
          GENERATED_FILE=$(ls *.AppImage | grep -v "linuxdeploy")
          mv "$GENERATED_FILE" "${{ env.APP_NAME }}-${{ env.TAG_VERSION }}-x86_64.AppImage"

      - name: Publicar Release en GitHub
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: |
            ${{ env.APP_NAME }}-${{ env.TAG_VERSION }}-x86_64.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
