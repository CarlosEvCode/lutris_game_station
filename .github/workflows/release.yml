name: Release Pipeline

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  # -------------------------------------------------------------------
  # JOB 1: RELEASE PLEASE
  # -------------------------------------------------------------------
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - name: Release Please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          release-type: simple
          path: .

  # -------------------------------------------------------------------
  # JOB 2: CONSTRUIR Y SUBIR APPIMAGE (Contenedor Ubuntu 20.04)
  # -------------------------------------------------------------------
  build_linux:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    name: Build & Release AppImage
    runs-on: ubuntu-latest
    container: ubuntu:20.04
    env:
      APP_NAME: lutris_game_station
      DEBIAN_FRONTEND: noninteractive

    steps:
      - name: Preparar entorno del contenedor
        run: |
          apt-get update
          apt-get install -y curl git unzip xz-utils libglu1-mesa ca-certificates sudo jq

      - name: Checkout del código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Instalar dependencias de compilación Linux
        run: |
          apt-get install -y \
            clang cmake ninja-build lld \
            libgtk-3-dev libblkid-dev liblzma-dev \
            libgcrypt20-dev libsqlite3-dev pkg-config \
            imagemagick patchelf libgdk-pixbuf2.0-dev

      - name: Configurar Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Extraer versión desde el TAG
        run: |
          TAG="${{ needs.release-please.outputs.tag_name }}"
          TAG=${TAG#v}
          echo "TAG_VERSION=$TAG" >> $GITHUB_ENV

      - name: Actualizar pubspec.yaml automáticamente
        run: |
          CURRENT_VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //')
          BUILD_NUMBER=$(echo $CURRENT_VERSION | cut -d'+' -f2)
          NEW_BUILD_NUMBER=$((BUILD_NUMBER + 1))
          sed -i "s/^version:.*/version: $TAG_VERSION+$NEW_BUILD_NUMBER/" pubspec.yaml

      - name: Commit de actualización de versión
        run: |
          git config --global --add safe.directory '*'
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add pubspec.yaml
          git commit -m "chore: actualizar versión a $TAG_VERSION [skip ci]"
          git push origin main

      - name: Instalar dependencias de Flutter
        run: flutter pub get

      - name: Compilar para Linux (Release)
        run: flutter build linux --release

      - name: Generar AppImage (Estrategia Maestra V7 - GTK Integration)
        env:
          APPIMAGE_EXTRACT_AND_RUN: 1
        run: |
          # 1. Descargar herramientas necesarias
          curl -L -o linuxdeploy-x86_64.AppImage https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          # URL corregida para el plugin GTK
          curl -L -o linuxdeploy-plugin-gtk.sh https://raw.githubusercontent.com/linuxdeploy/linuxdeploy-plugin-gtk/master/linuxdeploy-plugin-gtk.sh
          curl -L -o appimagetool-x86_64.AppImage https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          curl -L -o runtime-x86_64 https://github.com/AppImage/AppImageKit/releases/download/continuous/runtime-x86_64
          chmod +x *.AppImage
          chmod +x linuxdeploy-plugin-gtk.sh

          # 2. Preparar la estructura AppDir
          mkdir -p AppDir/usr/bin AppDir/usr/lib AppDir/usr/share/applications AppDir/usr/share/icons/hicolor/512x512/apps

          # 3. Copiar bundle de Flutter
          cp -r build/linux/x64/release/bundle/* AppDir/usr/bin/

          # 4. SOLUCIÓN SQLITE: Copiar al bundle
          SQLITE_SRC=$(ldconfig -p | grep libsqlite3.so.0 | head -n1 | awk '{print $4}')
          [ -z "$SQLITE_SRC" ] && SQLITE_SRC="/usr/lib/x86_64-linux-gnu/libsqlite3.so.0"
          cp -v "$SQLITE_SRC" AppDir/usr/bin/lib/libsqlite3.so

          # 5. Fijar RPATH
          BINARY="AppDir/usr/bin/${{ env.APP_NAME }}"
          patchelf --set-rpath '$ORIGIN/lib' "$BINARY"

          # 6. Desktop e Icono
          cp linux/${{ env.APP_NAME }}.desktop AppDir/usr/share/applications/
          convert linux/${{ env.APP_NAME }}.png -resize 512x512 AppDir/usr/share/icons/hicolor/512x512/apps/${{ env.APP_NAME }}.png || true

          # 7. Ejecutar linuxdeploy con el plugin GTK
          export LD_LIBRARY_PATH=$(pwd)/AppDir/usr/bin/lib:$LD_LIBRARY_PATH
          mkdir -p ./plugins
          cp linuxdeploy-plugin-gtk.sh ./plugins/linuxdeploy-plugin-gtk
          export PATH=$PATH:$(pwd)/plugins
          
          ./linuxdeploy-x86_64.AppImage --appdir AppDir \
            --executable "$BINARY" \
            --desktop-file AppDir/usr/share/applications/${{ env.APP_NAME }}.desktop \
            --icon-file AppDir/usr/share/icons/hicolor/512x512/apps/${{ env.APP_NAME }}.png \
            --plugin gtk

          # 8. AppRun especializado para GTK y Flutter
          cat > AppDir/AppRun <<'APP_RUN'
          #!/bin/sh
          HERE="$(dirname "$(readlink -f "$0")")"
          export LD_LIBRARY_PATH="$HERE/usr/bin/lib:$HERE/usr/lib:$LD_LIBRARY_PATH"
          export XDG_DATA_DIRS="$HERE/usr/share:$XDG_DATA_DIRS"
          export GDK_PIXBUF_MODULE_FILE="$(find "$HERE/usr/lib" -name loaders.cache | head -n 1)"
          export GSETTINGS_SCHEMA_DIR="$HERE/usr/share/glib-2.0/schemas"
          exec "$HERE/usr/bin/${{ env.APP_NAME }}" "$@"
          APP_RUN
          chmod +x AppDir/AppRun

          # 9. Crear el AppImage final
          ./appimagetool-x86_64.AppImage --runtime-file runtime-x86_64 AppDir "${{ env.APP_NAME }}-${{ env.TAG_VERSION }}-x86_64.AppImage"

      - name: Publicar Release en GitHub
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: |
            *.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
